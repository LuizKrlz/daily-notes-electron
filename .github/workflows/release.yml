name: Release macOS app

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build macOS artifacts
        run: npm run dist -- --mac --${{ matrix.arch }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-notes-${{ matrix.arch }}
          path: |
            dist-release/DailyNotes-${{ matrix.arch }}.dmg
            dist-release/DailyNotes-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-notes-${{ github.run_number }}
          name: Daily Notes ${{ github.run_number }}
          body: |
            Automated macOS release generated from `${{ github.sha }}`.

            Assets:
            - `DailyNotes-arm64.dmg` for Apple Silicon Macs.
            - `DailyNotes-x64.dmg` for Intel Macs.
            - `.zip` files containing the corresponding `.app`.

            This build is not notarized. On first open, macOS may require right-click > Open or explicit approval in Privacy & Security.
          files: |
            release-artifacts/daily-notes-arm64/DailyNotes-arm64.dmg
            release-artifacts/daily-notes-arm64/DailyNotes-arm64.zip
            release-artifacts/daily-notes-x64/DailyNotes-x64.dmg
            release-artifacts/daily-notes-x64/DailyNotes-x64.zip
