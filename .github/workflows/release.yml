name: Release macOS app

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build macOS artifacts
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-notes-${{ github.run_number }}
          name: Daily Notes ${{ github.run_number }}
          body: |
            Automated macOS release generated from `${{ github.sha }}`.

            Assets:
            - `DailyNotes.dmg` for drag-and-drop installation.
            - `DailyNotes.zip` containing `DailyNotes.app`.
          files: |
            dist-release/DailyNotes.dmg
            dist-release/DailyNotes.zip
